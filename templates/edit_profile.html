<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }
        .profile-card{
            max-width:700px;
            margin:auto;
            margin-top:60px;
            border-radius:15px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card shadow profile-card p-4">

        <h3 class="text-center mb-4">Edit Student Profile </h3>

        <form method="POST">

            <div class="mb-3">
                <label>Name</label>
                <input type="text"
                        name="name"
                        value="{{ student.name or '' }}"
                        class="form-control">
            </div>

            <div class="mb-3">
                <label>College Name</label>
                <input type="text" 
                        name="college_name"
                        value="{{ student.college_name or '' }}"
                        class="form-control">
            </div>

            <!-- Branch -->
            <div class="mb-3">
                <label class="form-label">Branch</label>
                <input type="text"
                       name="branch"
                       class="form-control"
                       placeholder="e.g. Computer Science"
                       value="{{ student.branch or '' }}">
            </div>

            <!-- CGPA -->
            <div class="mb-3">
                <label class="form-label">CGPA</label>
                <input type="text"
                       name="cgpa"
                       class="form-control"
                       placeholder="e.g. 8.5"
                       value="{{ student.cgpa or '' }}">
            </div>

            <!-- Skills -->
            <div class="mb-3">
                <label class="form-label">Skills</label>
                <input type="text"
                       name="skills"
                       class="form-control"
                       placeholder="Python, Flask, SQL"
                       value="{{ student.skills or '' }}">
            </div>

            <!-- Resume Link -->
            <div class="mb-3">
                <label class="form-label">Resume Link</label>
                <input type="text"
                       name="resume_link"
                       class="form-control"
                       placeholder="Paste Google Drive / Resume URL"
                       value="{{ student.resume_link or '' }}">
            </div>

            <!-- Buttons -->
            <button class="btn btn-primary w-100">
                Save Profile
            </button>

        </form>

        <a href="/student_dashboard"
           class="btn btn-secondary w-100 mt-3">
            Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
