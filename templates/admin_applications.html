{% extends "base.html" %}
{% block content %}

<div class="container mt-5" style="max-width:1100px;">

    <div class="card shadow-sm border-0 p-4 rounded-4">

        <h3 class="fw-bold mb-3">All Applications</h3>

        <table class="table table-hover">

            <thead>
                <tr>
                    <th>Student</th>
                    <th>Company</th>
                    <th>Job Role</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>

            {% for app in applications %}
            <tr>
                <td>{{ app.student.name }}</td>
                <td>{{ app.job.company.company_name }}</td>
                <td>{{ app.job.role }}</td>
                <td>{{ app.status }}</td>
            </tr>
            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
