{% extends "base.html" %}
{% block content %}

<div class="container mt-5" style="max-width:1100px;">

    <div class="card shadow-sm border-0 p-4 rounded-4">

        <h3 class="fw-bold mb-3">Manage Jobs</h3>

        <table class="table table-hover">

            <thead>
                <tr>
                    <th>Job Role</th>
                    <th>Company</th>
                    <th>Salary</th>
                    <th>Deadline</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>

            {% for job in jobs %}
            <tr>
                <td>{{ job.role }}</td>
                <td>{{ job.company.company_name }}</td>
                <td>{{ job.salary }}</td>
                <td>{{ job.deadline.strftime('%d %b %Y') }}</td>

                <td>
                    <span class="badge bg-secondary">
                        {{ job.status }}
                    </span>
                </td>

                <td>
                    <a href="/approve_job/{{ job.id }}"
                       class="btn btn-success btn-sm">
                       Approve
                    </a>

                    <a href="/reject_job/{{ job.id }}"
                       class="btn btn-danger btn-sm">
                       Reject
                    </a>
                </td>
            </tr>
            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
