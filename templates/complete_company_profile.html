{% extends "base.html" %}
{% block content %}

<div class="container mt-3" style="max-width:850px;">

    <!-- ===== HEADER CARD ===== -->
    <div class="card shadow-sm border-0 p-3 text-center mb-3">
        <h2 class="fw-bold mb-1">Complete Company Profile</h2>
        <p class="text-muted mb-0">
            Fill company details to access dashboard
        </p>
    </div>

    <!-- ===== FORM CARD ===== -->
    <div class="card shadow-sm border-0 p-3 mb-3">

        <form method="POST">

            <div class="row g-3">

                <!-- Company Name -->
                <div class="col-md-6">
                    <label class="form-label fw-bold">Company Name</label>
                    <input type="text" name="company_name"class="form-control"placeholder="Enter company name"value="{{ company.company_name if company else '' }}">
                </div>

                <!-- Industry -->
                <div class="col-md-6">
                    <label class="form-label fw-bold">Industry</label>
                    <input type="text" name="industry"
                           class="form-control"
                           placeholder="IT / Finance / Healthcare"
                           value="{{ company.industry if company else '' }}">
                </div>

                <!-- Location -->
                <div class="col-md-6">
                    <label class="form-label fw-bold">Location</label>
                    <input type="text" name="location"class="form-control"placeholder="City"value="{{ company.location if company else '' }}">
                </div>

                <!-- Website -->
                <div class="col-md-6">
                    <label class="form-label fw-bold">Website</label>
                    <input type="text" name="website"
                           class="form-control"
                           placeholder="https://company.com"
                           value="{{ company.website if company else '' }}">
                </div>

                <!-- Company Size -->
                <div class="col-md-6">
                    <label class="form-label fw-bold">Company Size</label>
                    <input type="text" name="company_size"
                           class="form-control"
                           placeholder="50 - 200 employees"
                           value="{{ company.company_size if company else '' }}">
                </div>

                <!-- HR Name -->
                <div class="col-md-6">
                    <label class="form-label fw-bold">HR Name</label>
                    <input type="text" name="hr_name"
                           class="form-control"
                           placeholder="HR person name"
                           value="{{ company.hr_name if company else '' }}">
                </div>
                <div class="mb-3">
                    <label>HR Email</label>
                    <input type="email" 
                            name="hr_email" 
                            class="form-control"
                            value="{{ company.hr_email if company else '' }}">
                </div>

                <!-- Description -->
                <div class="col-md-12">
                    <label class="form-label fw-bold">Company Description</label>
                    <textarea name="description"
                              rows="2"
                              class="form-control"
                              placeholder="Describe your company...">{{ company.description if company else '' }}</textarea>
                </div>

            </div>

            <!-- SAVE BUTTON -->
            <div class="text-center mt-3">
                <button type="submit" class="btn btn-primary px-4 py-2">
                    Save Profile
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
