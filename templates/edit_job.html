{% extends "base.html" %}
{% block content %}

<div class="container mt-4" style="max-width:700px;">

    <div class="card shadow-sm border-0 p-4">

        <h3 class="fw-bold mb-3"> Edit Job</h3>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label fw-bold">Role</label>
                <input type="text"
                       class="form-control"
                       name="role"
                       value="{{ job.role }}">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Skills</label>
                <input type="text"
                       class="form-control"
                       name="skills"
                       value="{{ job.skills }}">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Experience</label>
                <input type="text"
                       class="form-control"
                       name="experience"
                       value="{{ job.experience }}">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Salary</label>
                <input type="text"
                       class="form-control"
                       name="salary"
                       value="{{ job.salary }}">
            </div>

            <button class="btn btn-primary w-100">
                Update Job
            </button>

        </form>

    </div>

</div>

{% endblock %}
